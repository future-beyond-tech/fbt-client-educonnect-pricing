<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduConnect — Project Delivery Acceptance | FBT</title>
    <meta
      name="description"
      content="EduConnect — Project Delivery Acceptance Experience. A cinematic project reveal that showcases what was built for your school and lets you accept the work with confidence."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['DM Serif Display', 'serif'],
              sans: ['DM Sans', 'sans-serif'],
            },
            colors: {
              fbt: '#512BD4',
              'fbt-light': 'rgba(81,43,212,0.12)',
              'fbt-muted': '#6B4FE0',
              cyan: '#00E5CC',
              /* accent kept as alias so bg-accent/text-accent resolve to FBT purple */
              accent: '#512BD4',
              'accent-light': 'rgba(81,43,212,0.12)',
              'accent-muted': '#6B4FE0',
              amber: '#FFB020',
              dark: '#060910',
              /* warm-white now points to the dark main bg so bg-warm-white sections are dark */
              'warm-white': '#080B14',
              'bg-card': '#0F1520',
            },
          },
        },
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
